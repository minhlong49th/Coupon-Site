version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: coupon-site-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: coupon_site
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coupon_site"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Next.js Web Application Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coupon-site-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:secretpassword@db:5432/coupon_site
      - GEMINI_API_KEY=${GEMINI_API_KEY:-YOUR_GEMINI_API_KEY}
      - NEXT_PUBLIC_LOGODEV_TOKEN=${NEXT_PUBLIC_LOGODEV_TOKEN:-}
      # Thêm các biến môi trường cho Clerk nếu sử dụng thực tế
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
